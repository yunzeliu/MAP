# PointNet4D++ on HOI4D action segmentation (online setting).

data_path: ./datasets/AS_data_base

model:
  name: pointnet4d_plus
  args:
    num_classes: 19
    dim: 1024
    depth: 5
    heads: 4
    dim_head: 1024
    mlp_dim: 4096
    length: 150
    head_hidden_dim: 512

seed: 803
epochs: 80
batch_size: 8
workers: 10
optimizer: adamw
lr: 0.0005
weight_decay: 0.05
betas: [0.9, 0.95]
lr_warmup_epochs: 10
lr_milestones: [40, 60]
lr_gamma: 0.1
print_freq: 20
ckpt_freq: 10
eval_overlaps: [0.10, 0.25, 0.50]
