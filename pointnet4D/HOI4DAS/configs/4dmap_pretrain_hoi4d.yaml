# 4DMAP self-supervised pretraining on HOI4D.
# The saved encoder checkpoint can be loaded via --pretrained in
# scripts/train_action_seg.py for finetuning.

data_path: ./datasets/AS_data_base
num_points: 2048

encoder:
  name: pointnet4d_plus    # or "pointnet4d"
  args:
    num_classes: 19
    dim: 1024
    depth: 5
    heads: 4
    dim_head: 1024
    mlp_dim: 4096
    length: 150
    head_hidden_dim: 512

mask_ratio: 0.50
decoder_depth: 4
decoder_heads: 8

seed: 803
epochs: 50
batch_size: 4
workers: 10
lr: 0.0005
weight_decay: 0.05
lr_warmup_epochs: 10
lr_milestones: [30, 45]
lr_gamma: 0.1
print_freq: 20
ckpt_freq: 5
